<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Just for you 💌</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="static/css/style.css">
</head>
<body class="login-page">

  <div class="bubbles" aria-hidden="true">
    <span></span><span></span><span></span>
    <span></span><span></span><span></span>
  </div>

  <main class="login-container">
    <div class="login-card">
      <div class="lock-icon">🗝️</div>
      <h1 class="login-title">A little something<br><em>just for you</em></h1>
      <p class="login-hint">Enter a date that means everything to us<br><span class="format-hint">MM/DD/YY</span></p>

      <div class="login-form">
        <div class="input-wrapper">
          <input
            type="text"
            id="date-input"
            placeholder="MM/DD/YY"
            maxlength="8"
            autocomplete="off"
            class="date-input"
            autofocus
          />
          <p class="error-msg" id="error-msg" style="display:none;">That date doesn't seem right — try again 💭</p>
        </div>
        <button class="btn-enter" id="submit-btn">Open it ✨</button>
      </div>
    </div>
  </main>

  <script src="static/js/login.js"></script>
</body>
</html>
