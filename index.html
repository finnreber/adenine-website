<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Just for you 💌</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="static/css/style.css">
</head>
<body class="login-page">

  <!-- Animated starfield / petals -->
  <canvas id="petal-canvas"></canvas>

  <!-- Decorative blobs -->
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>

  <main class="login-outer">
    <div class="login-card">

      <!-- Top decorative line -->
      <div class="card-ornament">
        <span class="orn-line"></span>
        <span class="orn-heart">♡</span>
        <span class="orn-line"></span>
      </div>

      <p class="eyebrow">a little something</p>
      <h1 class="login-title">Just for<br><em>you</em></h1>

      <p class="login-sub">Enter the date that started it all</p>

      <div class="date-wrap">
        <input
          type="text"
          id="date-input"
          placeholder="MM / DD / YY"
          maxlength="10"
          autocomplete="off"
          class="date-input"
          autofocus
        />
        <div class="input-underline"></div>
      </div>

      <p class="error-msg" id="error-msg">hmm, that's not quite right 💭</p>

      <button class="btn-enter" id="submit-btn">
        <span class="btn-text">Open it</span>
        <span class="btn-arrow">→</span>
      </button>

      <div class="card-ornament card-ornament--bottom">
        <span class="orn-line"></span>
        <span class="orn-dot"></span>
        <span class="orn-dot"></span>
        <span class="orn-dot"></span>
        <span class="orn-line"></span>
      </div>

    </div>
  </main>

  <script src="static/js/petals.js"></script>
  <script src="static/js/login.js"></script>
</body>
</html>
